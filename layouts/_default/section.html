{{ define "main" }}
{{ .Content }}
{{ if or (not (.Params.nocontents)) (.Pages) }}
<h2 id="contents">Contents</h2>
<ul class="section-list">
{{ range .Pages }}
<li>
  {{if not .Date.IsZero}}<span class="section-date">{{ .Date.Format "2006-01-02" }}</span>{{end}}
  <span class="section-title"><a href="{{.Permalink | relURL}}">{{.Title}}</a></span>
</li>
{{ end }}
</ul>
{{ end }}
{{ end }}
