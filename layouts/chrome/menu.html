<div class="share-row">
  <a href="https://twitter.com/intent/tweet/?text={{ .Title }}&amp;via={{ .Site.Params.twitter.username }}&amp;url={{ .Permalink }}" target="_blank" rel="noopener" aria-label="Share on Twitter">{{ partial "icon.html" "twitter" }} Twitter</a>
  <a href="https://facebook.com/sharer/sharer.php?u={{ .Permalink }}" target="_blank" rel="noopener" aria-label="Share on Facebook">{{ partial "icon.html" "facebook" }} Facebook</a>
  <a href="https://reddit.com/submit/?url={{ .Permalink }}&amp;resubmit=true&amp;title={{ .Title }}" target="_blank" rel="noopener" aria-label="Share on Reddit">{{ partial "icon.html" "reddit" }} Reddit</a>
  <a href="https://github.com/ncw/" aria-label="GitHub">{{ partial "icon.html" "github" }} GitHub</a>
  <a href="https://twitter.com/njcw" aria-label="Twitter">{{ partial "icon.html" "twitter" }} @njcw</a>
  <a href="{{ "links/" | relURL }}" aria-label="More links">{{ partial "icon.html" "user" }} Links</a>
</div>
