<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Green board background -->
  <rect width="128" height="128" fill="#3D8A4D"/>
  <!-- Grid lines -->
  <g stroke="#070405" stroke-width="2">
    <line x1="16" y1="0" x2="16" y2="128"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="48" y1="0" x2="48" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="80" y1="0" x2="80" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
    <line x1="112" y1="0" x2="112" y2="128"/>
    <line x1="0" y1="16" x2="128" y2="16"/>
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="48" x2="128" y2="48"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="80" x2="128" y2="80"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
    <line x1="0" y1="112" x2="128" y2="112"/>
  </g>
  <!-- White discs -->
  <circle cx="56" cy="56" r="6" fill="#EEE" stroke="#CCC" stroke-width="1"/>
  <circle cx="72" cy="72" r="6" fill="#EEE" stroke="#CCC" stroke-width="1"/>
  <circle cx="40" cy="56" r="6" fill="#EEE" stroke="#CCC" stroke-width="1"/>
  <circle cx="56" cy="40" r="6" fill="#EEE" stroke="#CCC" stroke-width="1"/>
  <circle cx="72" cy="88" r="6" fill="#EEE" stroke="#CCC" stroke-width="1"/>
  <circle cx="88" cy="56" r="6" fill="#EEE" stroke="#CCC" stroke-width="1"/>
  <circle cx="88" cy="72" r="6" fill="#EEE" stroke="#CCC" stroke-width="1"/>
  <!-- Black discs -->
  <circle cx="72" cy="56" r="6" fill="#222" stroke="#111" stroke-width="1"/>
  <circle cx="56" cy="72" r="6" fill="#222" stroke="#111" stroke-width="1"/>
  <circle cx="40" cy="72" r="6" fill="#222" stroke="#111" stroke-width="1"/>
  <circle cx="56" cy="88" r="6" fill="#222" stroke="#111" stroke-width="1"/>
  <circle cx="72" cy="40" r="6" fill="#222" stroke="#111" stroke-width="1"/>
  <circle cx="88" cy="40" r="6" fill="#222" stroke="#111" stroke-width="1"/>
  <circle cx="40" cy="40" r="6" fill="#222" stroke="#111" stroke-width="1"/>
  <circle cx="88" cy="88" r="6" fill="#222" stroke="#111" stroke-width="1"/>
