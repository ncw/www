<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Checkerboard background -->
  <rect width="128" height="128" fill="#B58863"/>
  <rect x="0" y="0" width="32" height="32" fill="#F0D9B5"/>
  <rect x="64" y="0" width="32" height="32" fill="#F0D9B5"/>
  <rect x="32" y="32" width="32" height="32" fill="#F0D9B5"/>
  <rect x="96" y="32" width="32" height="32" fill="#F0D9B5"/>
  <rect x="0" y="64" width="32" height="32" fill="#F0D9B5"/>
  <rect x="64" y="64" width="32" height="32" fill="#F0D9B5"/>
  <rect x="32" y="96" width="32" height="32" fill="#F0D9B5"/>
  <rect x="96" y="96" width="32" height="32" fill="#F0D9B5"/>
  <!-- Vertical domino (blue) - spans two rows -->
  <rect x="3" y="3" width="26" height="58" rx="4" fill="#3366BB" stroke="#224488" stroke-width="1.5"/>
  <line x1="3" y1="32" x2="29" y2="32" stroke="#224488" stroke-width="1"/>
  <!-- Vertical domino (blue) -->
  <rect x="67" y="35" width="26" height="58" rx="4" fill="#3366BB" stroke="#224488" stroke-width="1.5"/>
  <line x1="67" y1="64" x2="93" y2="64" stroke="#224488" stroke-width="1"/>
  <!-- Horizontal domino (red) -->
  <rect x="35" y="67" width="58" height="26" rx="4" fill="#BB3333" stroke="#882222" stroke-width="1.5"/>
  <line x1="64" y1="67" x2="64" y2="93" stroke="#882222" stroke-width="1"/>
  <!-- Horizontal domino (red) -->
  <rect x="35" y="3" width="58" height="26" rx="4" fill="#BB3333" stroke="#882222" stroke-width="1.5"/>
  <line x1="64" y1="3" x2="64" y2="29" stroke="#882222" stroke-width="1"/>
  <!-- Vertical domino (blue) -->
  <rect x="99" y="67" width="26" height="58" rx="4" fill="#3366BB" stroke="#224488" stroke-width="1.5"/>
  <line x1="99" y1="96" x2="125" y2="96" stroke="#224488" stroke-width="1"/>
</svg>
