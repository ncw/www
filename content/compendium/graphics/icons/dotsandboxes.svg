<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dark background -->
  <rect width="128" height="128" fill="#1E1E1E"/>
  <!-- Filled boxes -->
  <rect x="18" y="18" width="28" height="28" fill="#2ECC71" opacity="0.3"/>
  <rect x="50" y="18" width="28" height="28" fill="#2ECC71" opacity="0.3"/>
  <rect x="82" y="18" width="28" height="28" fill="#E74C3C" opacity="0.3"/>
  <rect x="18" y="50" width="28" height="28" fill="#E74C3C" opacity="0.3"/>
  <rect x="50" y="50" width="28" height="28" fill="#2ECC71" opacity="0.3"/>
  <!-- Claimed edges (green - player 1) -->
  <line x1="14" y1="14" x2="46" y2="14" stroke="#2ECC71" stroke-width="3"/>
  <line x1="46" y1="14" x2="78" y2="14" stroke="#2ECC71" stroke-width="3"/>
  <line x1="14" y1="14" x2="14" y2="46" stroke="#2ECC71" stroke-width="3"/>
  <line x1="46" y1="14" x2="46" y2="46" stroke="#2ECC71" stroke-width="3"/>
  <line x1="78" y1="14" x2="78" y2="46" stroke="#2ECC71" stroke-width="3"/>
  <line x1="14" y1="46" x2="46" y2="46" stroke="#2ECC71" stroke-width="3"/>
  <line x1="46" y1="46" x2="78" y2="46" stroke="#2ECC71" stroke-width="3"/>
  <line x1="14" y1="46" x2="14" y2="78" stroke="#2ECC71" stroke-width="3"/>
  <line x1="78" y1="46" x2="78" y2="78" stroke="#2ECC71" stroke-width="3"/>
  <line x1="46" y1="46" x2="46" y2="78" stroke="#2ECC71" stroke-width="3"/>
  <line x1="46" y1="78" x2="78" y2="78" stroke="#2ECC71" stroke-width="3"/>
  <!-- Claimed edges (red - player 2) -->
  <line x1="78" y1="14" x2="110" y2="14" stroke="#E74C3C" stroke-width="3"/>
  <line x1="110" y1="14" x2="110" y2="46" stroke="#E74C3C" stroke-width="3"/>
  <line x1="78" y1="46" x2="110" y2="46" stroke="#E74C3C" stroke-width="3"/>
  <line x1="14" y1="78" x2="46" y2="78" stroke="#E74C3C" stroke-width="3"/>
  <!-- Unclaimed edges (thin solid lines instead of dashed) -->
  <line x1="14" y1="78" x2="14" y2="110" stroke="#555555" stroke-width="1.5"/>
  <line x1="46" y1="78" x2="46" y2="110" stroke="#555555" stroke-width="1.5"/>
  <line x1="78" y1="78" x2="78" y2="110" stroke="#555555" stroke-width="1.5"/>
  <line x1="110" y1="46" x2="110" y2="78" stroke="#555555" stroke-width="1.5"/>
  <line x1="110" y1="78" x2="110" y2="110" stroke="#555555" stroke-width="1.5"/>
  <line x1="14" y1="110" x2="46" y2="110" stroke="#555555" stroke-width="1.5"/>
  <line x1="46" y1="110" x2="78" y2="110" stroke="#555555" stroke-width="1.5"/>
  <line x1="78" y1="110" x2="110" y2="110" stroke="#555555" stroke-width="1.5"/>
  <line x1="78" y1="78" x2="110" y2="78" stroke="#555555" stroke-width="1.5"/>
  <!-- Dots -->
  <circle cx="14" cy="14" r="4" fill="#FFFFFF"/>
  <circle cx="46" cy="14" r="4" fill="#FFFFFF"/>
  <circle cx="78" cy="14" r="4" fill="#FFFFFF"/>
  <circle cx="110" cy="14" r="4" fill="#FFFFFF"/>
  <circle cx="14" cy="46" r="4" fill="#FFFFFF"/>
  <circle cx="46" cy="46" r="4" fill="#FFFFFF"/>
  <circle cx="78" cy="46" r="4" fill="#FFFFFF"/>
  <circle cx="110" cy="46" r="4" fill="#FFFFFF"/>
  <circle cx="14" cy="78" r="4" fill="#FFFFFF"/>
  <circle cx="46" cy="78" r="4" fill="#FFFFFF"/>
  <circle cx="78" cy="78" r="4" fill="#FFFFFF"/>
  <circle cx="110" cy="78" r="4" fill="#FFFFFF"/>
  <circle cx="14" cy="110" r="4" fill="#FFFFFF"/>
  <circle cx="46" cy="110" r="4" fill="#FFFFFF"/>
  <circle cx="78" cy="110" r="4" fill="#FFFFFF"/>
  <circle cx="110" cy="110" r="4" fill="#FFFFFF"/>
</svg>
