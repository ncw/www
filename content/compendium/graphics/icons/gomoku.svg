<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Wooden board background -->
  <rect width="128" height="128" fill="#DCB35C"/>
  <!-- Grid lines -->
  <g stroke="#3A2411" stroke-width="1">
    <!-- Vertical lines -->
    <line x1="14" y1="14" x2="14" y2="114"/>
    <line x1="27" y1="14" x2="27" y2="114"/>
    <line x1="40" y1="14" x2="40" y2="114"/>
    <line x1="53" y1="14" x2="53" y2="114"/>
    <line x1="66" y1="14" x2="66" y2="114"/>
    <line x1="79" y1="14" x2="79" y2="114"/>
    <line x1="92" y1="14" x2="92" y2="114"/>
    <line x1="105" y1="14" x2="105" y2="114"/>
    <line x1="114" y1="14" x2="114" y2="114"/>
    <!-- Horizontal lines -->
    <line x1="14" y1="14" x2="114" y2="14"/>
    <line x1="14" y1="27" x2="114" y2="27"/>
    <line x1="14" y1="40" x2="114" y2="40"/>
    <line x1="14" y1="53" x2="114" y2="53"/>
    <line x1="14" y1="66" x2="114" y2="66"/>
    <line x1="14" y1="79" x2="114" y2="79"/>
    <line x1="14" y1="92" x2="114" y2="92"/>
    <line x1="14" y1="105" x2="114" y2="105"/>
    <line x1="14" y1="114" x2="114" y2="114"/>
  </g>
  <!-- Star points (hoshi) -->
  <circle cx="40" cy="40" r="2.5" fill="#3A2411"/>
  <circle cx="92" cy="40" r="2.5" fill="#3A2411"/>
  <circle cx="66" cy="66" r="2.5" fill="#3A2411"/>
  <circle cx="40" cy="92" r="2.5" fill="#3A2411"/>
  <circle cx="92" cy="92" r="2.5" fill="#3A2411"/>
  <!-- Black stones (layered circles like graphics/gomoku/blackStone.svg) -->
  <circle cx="53" cy="53" r="5.5" fill="#0a0a0a"/>
  <circle cx="52.5" cy="52.5" r="5" fill="#1c1c1c"/>
  <circle cx="52" cy="52" r="4.2" fill="#2a2a2a"/>
  <circle cx="66" cy="40" r="5.5" fill="#0a0a0a"/>
  <circle cx="65.5" cy="39.5" r="5" fill="#1c1c1c"/>
  <circle cx="65" cy="39" r="4.2" fill="#2a2a2a"/>
  <circle cx="79" cy="53" r="5.5" fill="#0a0a0a"/>
  <circle cx="78.5" cy="52.5" r="5" fill="#1c1c1c"/>
  <circle cx="78" cy="52" r="4.2" fill="#2a2a2a"/>
  <circle cx="66" cy="66" r="5.5" fill="#0a0a0a"/>
  <circle cx="65.5" cy="65.5" r="5" fill="#1c1c1c"/>
  <circle cx="65" cy="65" r="4.2" fill="#2a2a2a"/>
  <!-- White stones (layered circles like graphics/gomoku/whiteStone.svg) -->
  <circle cx="53" cy="40" r="5.5" fill="#c8c3b5"/>
  <circle cx="52.5" cy="39.5" r="5" fill="#e0dcd0"/>
  <circle cx="52" cy="39" r="4.2" fill="#f0ede4"/>
  <circle cx="66" cy="53" r="5.5" fill="#c8c3b5"/>
  <circle cx="65.5" cy="52.5" r="5" fill="#e0dcd0"/>
  <circle cx="65" cy="52" r="4.2" fill="#f0ede4"/>
  <circle cx="79" cy="40" r="5.5" fill="#c8c3b5"/>
  <circle cx="78.5" cy="39.5" r="5" fill="#e0dcd0"/>
  <circle cx="78" cy="39" r="4.2" fill="#f0ede4"/>
  <circle cx="79" cy="66" r="5.5" fill="#c8c3b5"/>
  <circle cx="78.5" cy="65.5" r="5" fill="#e0dcd0"/>
  <circle cx="78" cy="65" r="4.2" fill="#f0ede4"/>
</svg>
